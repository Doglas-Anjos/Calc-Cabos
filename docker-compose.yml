services:
  db-bt:
    image: postgres:16
    container_name: calc-cabos-db-bt
    environment:
      POSTGRES_USER: calc_cabos
      POSTGRES_PASSWORD: calc_cabos
      POSTGRES_DB: calc_cabos_bt
    ports:
      - "5432:5432"
    volumes:
      - db_bt_data:/var/lib/postgresql/data
      - ./database/bt:/docker-entrypoint-initdb.d:ro

  db-app:
    image: postgres:16
    container_name: calc-cabos-db-app
    environment:
      POSTGRES_USER: calc_cabos
      POSTGRES_PASSWORD: calc_cabos
      POSTGRES_DB: calc_cabos_app
    ports:
      - "5433:5432"
    volumes:
      - db_app_data:/var/lib/postgresql/data
      - ./database/app:/docker-entrypoint-initdb.d:ro

  db-mt:
    image: postgres:16
    container_name: calc-cabos-db-mt
    environment:
      POSTGRES_USER: calc_cabos
      POSTGRES_PASSWORD: calc_cabos
      POSTGRES_DB: calc_cabos_mt
    ports:
      - "5434:5432"
    volumes:
      - db_mt_data:/var/lib/postgresql/data
      - ./database/mt:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7
    container_name: calc-cabos-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # api/web rodam via imagem node genérica (sem Dockerfile próprio nesta
  # fase) — o repo inteiro é montado e o node_modules (instalado uma vez
  # com `npm install` na raiz) persiste no host entre restarts do container.
  api:
    image: node:20
    working_dir: /workspace
    command: sh -c "npm install && npm run dev:api"
    volumes:
      - ./:/workspace
    ports:
      - "3000:3000"
    environment:
      APP_DB_HOST: db-app
      APP_DB_PORT: 5432
      BT_DB_HOST: db-bt
      BT_DB_PORT: 5432
      MT_DB_HOST: db-mt
      MT_DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - db-bt
      - db-app
      - db-mt
      - redis

  web:
    image: node:20
    working_dir: /workspace
    command: sh -c "npm install && npm run dev:web"
    volumes:
      - ./:/workspace
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000/api
    depends_on:
      - api

volumes:
  db_bt_data:
  db_app_data:
  db_mt_data:
  redis_data:
